# MarkdownLint Configuration for Askyl.Dsm.WebHosting Documentation
# Reference: https://github.com/DavidAnson/markdownlint

# Default state for all rules
default: true

# MD013/line-length - Line length
# Disabled: Technical docs contain code examples, URLs, and long technical terms
MD013:
  line_length: 200
  tables: false
  code_blocks: false
  headings: false

# MD060/table-column-style - Table column style
# Disabled: Tables in technical docs vary in format for readability
MD060: false

# MD040/fenced-code-language - Fenced code language
# Keep enabled but allow empty for diagrams/structure trees
MD040:
  allowed_languages:
    - "" # Allow empty for ASCII art/trees
    - text # Allow text for file trees and plain content
    - bash
    - csharp
    - xml
    - markdown

# MD033/no-inline-html - Inline HTML
# Disabled: Tables use <T> for type formatting
MD033: false

# MD036/no-emphasis-as-heading - Emphasis as heading
# Disabled: README badges section uses emphasis for tagline
MD036: false

# MD042/no-empty-links - No empty links
# Disabled: Architecture badge uses placeholder link (#)
MD042: false

# MD032/blanks-around-lists - Blank lines around lists
# Keep enabled for readability
MD032: true

# MD024/no-duplicate-heading - Duplicate headings
# Disabled: Technical docs may have repeated section names in different contexts
MD024: false

# Additional sensible defaults
MD007/ul-indent:
  indent: 2

MD009/no-trailing-spaces: true

MD010/no-hard-tabs: true

MD028/no-blanks-blockquote: true

MD031/blanks-around-fences: true

MD041/first-line-heading: false
